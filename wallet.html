<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFEORA Wallet</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{background:#0a0c12;color:white;font-family:sans-serif;margin:0}
.container{max-width:480px;margin:auto;padding:15px}

/* CARD */
.card{background:#111827;padding:20px;border-radius:20px;margin-bottom:15px;text-align:center}
.balance{font-size:30px;font-weight:bold}

/* BUTTON GRID FIX */
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:15px}
.action{background:#1f2937;padding:12px;border-radius:12px}

/* ASSET */
.asset{display:flex;justify-content:space-between;background:#111827;padding:12px;border-radius:12px;margin-bottom:10px}

/* FULL SCREEN MODAL */
.screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;display:none;z-index:999}
.screen-box{max-width:480px;margin:auto;padding:20px}
</style>
</head>

<body>

<div class="container">

<h2>SAFEORA</h2>

<div class="card">
<div>Total Balance</div>
<div class="balance" id="totalUsd">$0</div>

<div class="actions">
<div class="action" onclick="openDeposit()">Deposit</div>
<div class="action" onclick="openWithdraw()">Withdraw</div>
<div class="action" onclick="loadHistory()">History</div>
</div>
</div>

<!-- ASSETS -->
<div class="asset">
<div>TON</div>
<div>
<div id="tonBalance">0</div>
<div id="tonUsd">$0</div>
</div>
</div>

<div class="asset">
<div>USDT</div>
<div>
<div id="usdtBalance">0</div>
<div id="usdtUsd">$0</div>
</div>
</div>

<!-- API -->
<button onclick="createApi()">Generate API</button>
<div id="apiKey"></div>

</div>

<!-- ===== DEPOSIT SCREEN ===== -->
<div id="depositScreen" class="screen">
<div class="screen-box">

<button onclick="closeDeposit()">Back</button>

<h3>Deposit</h3>

<img id="qr" width="200">

<div id="addr"></div>

<button onclick="copy()">Copy</button>

</div>
</div>

<!-- ===== WITHDRAW SCREEN ===== -->
<div id="withdrawScreen" class="screen">
<div class="screen-box">

<button onclick="closeWithdraw()">Back</button>

<h3>Withdraw</h3>

<input id="wAddr" placeholder="Wallet"><br><br>
<input id="wAmt" placeholder="Amount"><br><br>

<button onclick="send()">Send</button>

</div>
</div>

<script>
const API="https://safeora.onrender.com"
let KEY=localStorage.getItem("key")

// CREATE API
async function createApi(){
let id=prompt("User ID")
let r=await fetch(API+"/api/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:id})})
let d=await r.json()

if(d.success){
KEY=d.api_key
localStorage.setItem("key",KEY)
document.getElementById("apiKey").innerText=KEY
}
}

// LOAD BALANCE
async function load(){
if(!KEY)return

let r=await fetch(API+"/api/balance",{headers:{"x-api-key":KEY}})
let d=await r.json()

if(d.success){
let ton=d.balance

document.getElementById("tonBalance").innerText=ton

// LIVE PRICE
let price=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd")
let p=await price.json()

let usd=ton*p["the-open-network"].usd

document.getElementById("tonUsd").innerText="$"+usd.toFixed(2)
document.getElementById("totalUsd").innerText="$"+usd.toFixed(2)
}
}

// DEPOSIT
async function openDeposit(){
document.getElementById("depositScreen").style.display="block"

let r=await fetch(API+"/api/deposit/info",{headers:{"x-api-key":KEY}})
let d=await r.json()

document.getElementById("addr").innerText=d.deposit_address

document.getElementById("qr").src=
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+d.deposit_address
}

function closeDeposit(){
document.getElementById("depositScreen").style.display="none"
}

function copy(){
navigator.clipboard.writeText(document.getElementById("addr").innerText)
alert("Copied")
}

// WITHDRAW
function openWithdraw(){
document.getElementById("withdrawScreen").style.display="block"
}

function closeWithdraw(){
document.getElementById("withdrawScreen").style.display="none"
}

async function send(){
let addr=document.getElementById("wAddr").value
let amt=document.getElementById("wAmt").value

let r=await fetch(API+"/api/withdraw",{
method:"POST",
headers:{
"x-api-key":KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({wallet:addr,amount:amt})
})

let d=await r.json()
alert(JSON.stringify(d))
}

// AUTO LOAD
setInterval(load,10000)
load()
</script>

</body>
</html>
