<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SAFEORA • Secure Crypto Wallet</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: radial-gradient(circle at 10% 20%, #0a0c12, #03050b);
    font-family: 'Inter', sans-serif;
    padding: 24px 16px 40px;
    color: #ffffff;
    min-height: 100vh;
  }

  ::-webkit-scrollbar {
    width: 4px;
  }
  ::-webkit-scrollbar-track {
    background: #1e293b;
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb {
    background: #3b82f6;
    border-radius: 10px;
  }

  .app-container {
    max-width: 500px;
    margin: 0 auto;
  }
.wallet-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  backdrop-filter: blur(8px);
  background: rgba(15, 25, 45, 0.55);
  padding: 12px 20px;
  border-radius: 60px;
  border: 1px solid rgba(59, 130, 246, 0.25);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  background: linear-gradient(135deg, #3b82f6, #2dd4bf);
  width: 38px;
  height: 38px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 12px rgba(59,130,246,0.4);
}
.logo-text h1 {
  font-size: 1.65rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  background: linear-gradient(120deg, #ffffff, #94a3b8);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.settings-btn {
  background: rgba(30, 41, 59, 0.8);
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 40px;
  color: white;
  font-size: 1.3rem;
  cursor: pointer;
  backdrop-filter: blur(4px);
  transition: all 0.2s ease;
}
.settings-btn:hover {
  background: #3b82f6;
  transform: rotate(15deg);
}

.glass-card {
  background: rgba(18, 25, 45, 0.75);
  backdrop-filter: blur(12px);
  border-radius: 32px;
  padding: 24px 22px;
  margin-bottom: 20px;
  border: 1px solid rgba(59, 130, 246, 0.3);
  box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
  transition: transform 0.2s, border-color 0.2s;
}
.glass-card:hover {
  border-color: #3b82f680;
  transform: translateY(-2px);
}

.asset-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.balance-value {
  font-size: 2.6rem;
  font-weight: 700;
  margin-top: 10px;
  background: linear-gradient(135deg, #F0F4FF, #b9c7dc);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
    .btn-primary {
      background: linear-gradient(95deg, #2563eb, #1e40af);
      border: none;
      width: 100%;
      padding: 14px;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 5px 12px rgba(37,99,235,0.3);
    }
    .btn-primary:hover {
      background: linear-gradient(95deg, #3b82f6, #2563eb);
      transform: scale(0.98);
    }
    .btn-outline-light {
      background: rgba(255,255,255,0.05);
      border: 1px solid #2d3a5e;
      padding: 12px;
      border-radius: 40px;
      color: #e2e8f0;
      cursor: pointer;
    }
    .api-key-display {
      background: #0f172a;
      border-radius: 20px;
      padding: 14px 16px;
      margin-top: 16px;
      font-family: monospace;
      font-size: 0.8rem;
      border-left: 4px solid #3b82f6;
    }
    .status-badge {
      background: #10b98120;
      color: #6ee7b7;
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- header -->
  <div class="wallet-header">
    <div class="logo-area">
      <div class="logo-icon">
        <i class="fas fa-shield-alt"></i>
      </div>
      <div class="logo-text">
        <h1>SAFEORA</h1>
        <p>Secure • Decentral • Vault</p>
      </div>
    </div>
    <button class="settings-btn" onclick="openSettingsModal()">
      <i class="fas fa-sliders-h"></i>
    </button>
  </div>

  <!-- TON Card -->
  <div class="glass-card">
    <div class="asset-header">
      <div class="asset-icon">
        <i class="fab fa-telegram-plane" style="color: #3b82f6;"></i>
      </div>
      <div class="asset-title">TON Coin</div>
      <div style="flex:1"></div>
      <div class="status-badge"><i class="fas fa-circle"></i> active</div>
    </div>
    <div class="balance-value" id="ton_balance_display">— TON</div>
  </div>
<!-- USDT Card -->
<div class="glass-card">
  <div class="asset-header">
    <div class="asset-icon">
      <i class="fas fa-dollar-sign" style="color: #22c55e;"></i>
    </div>
    <div class="asset-title">USDT (TRC-20)</div>
  </div>
  <div class="balance-value" id="usdt_balance_display">0.00 USDT</div>
</div>

<!-- API Section -->
<div class="glass-card" style="background: rgba(0,0,0,0.45);">
  <div style="display: flex; justify-content: space-between;">
    <h3><i class="fas fa-key"></i> API Access</h3>
    <span id="api_status_indicator" class="status-badge"><i class="fas fa-lock"></i> not set</span>
  </div>
  <button class="btn-primary" onclick="createApiKey()">
    <i class="fas fa-asterisk"></i> Generate API Key
  </button>
  <div id="api_key_container" style="margin-top: 18px;"></div>
</div>
  <!-- Action Buttons -->
  <div style="display: flex; justify-content: space-between; gap: 12px; margin-top: 10px;">
    <button class="btn-outline-light" onclick="manualRefreshBalance()" style="width: 50%;">
      <i class="fas fa-sync-alt"></i> Refresh
    </button>
    <button class="btn-outline-light" onclick="clearApiWarning()" style="width: 50%;">
      <i class="fas fa-trash-alt"></i> Clear API
    </button>
  </div>
  <div class="footer-note" style="text-align: center; font-size: 0.7rem; color: #475569; margin-top: 40px;">
    <i class="fas fa-database"></i> SAFEORA non-custodial interface
  </div>
</div>

<script>
// ==================== SAFEORA WALLET CORE ====================
let API_KEY = localStorage.getItem("safeora_api_key") || null;
let lastBalanceCache = { ton: null, usdt: null };

const tonElem = document.getElementById("ton_balance_display");
const usdtElem = document.getElementById("usdt_balance_display");
const apiStatusSpan = document.getElementById("api_status_indicator");
const apiContainer = document.getElementById("api_key_container");

function updateApiDisplay() {
  if (!apiContainer) return;
  if (API_KEY) {
    const masked = API_KEY.length > 16 ? API_KEY.slice(0, 10) + "••••" + API_KEY.slice(-6) : API_KEY;
    apiContainer.innerHTML = `<div class="api-key-display"><i class="fas fa-fingerprint"></i> Active: <code>${masked}</code></div>`;
    apiStatusSpan.innerHTML = '<i class="fas fa-check-circle"></i> active';
  } else {
    apiContainer.innerHTML = `<div class="api-key-display"><i class="fas fa-hourglass-half"></i> No API key configured</div>`;
    apiStatusSpan.innerHTML = '<i class="fas fa-lock"></i> not set';
  }
}
async function loadBalance() {
  if (!API_KEY) {
    if (tonElem) tonElem.innerText = "— TON";
    if (usdtElem) usdtElem.innerText = "0.00 USDT";
    return;
  }
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000);
    const res = await fetch("/api/balance", {
      headers: { "x-api-key": API_KEY },
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error("API error");
    const data = await res.json();
    if (data.success) {
      let tonAmount = parseFloat(data.balance);
      tonElem.innerText = (isNaN(tonAmount) ? 0 : tonAmount).toFixed(4) + " TON";
      await loadUsdtBalance();
    }
  } catch (err) {
    tonElem.innerText = "Error";
  }
}

async function loadUsdtBalance() {
  if (!API_KEY) { usdtElem.innerText = "0.00 USDT"; return; }
  try {
    const res = await fetch("/api/balance?asset=usdt", { headers: { "x-api-key": API_KEY } });
    if (res.ok) {
      const data = await res.json();
      if (data.success) usdtElem.innerText = parseFloat(data.balance).toFixed(2) + " USDT";
    }
  } catch(e) { usdtElem.innerText = "0.00 USDT"; }
}
async function createApiKey() {
  let userId = prompt("Enter your User ID to generate API key");
  if (!userId || userId.trim() === "") return;
  const btn = event?.target?.closest?.('button');
  if (btn) btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Generating...';
  try {
    const res = await fetch("/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId.trim() })
    });
    const data = await res.json();
    if (data.success && data.api_key) {
      API_KEY = data.api_key;
      localStorage.setItem("safeora_api_key", API_KEY);
      updateApiDisplay();
      await loadBalance();
      showToast("✅ API Key generated successfully", "success");
    } else throw new Error("Invalid response");
  } catch (err) {
    alert("Error: " + err.message);
  } finally {
    if (btn) btn.innerHTML = '<i class="fas fa-asterisk"></i> Generate API Key';
  }
}

async function manualRefreshBalance() {
  if (!API_KEY) { alert("Generate API key first"); return; }
  await loadBalance();
  showToast("Balances refreshed", "info");
}
  function clearApiWarning() {
    if (confirm("Remove API key?")) {
      API_KEY = null;
      localStorage.removeItem("safeora_api_key");
      updateApiDisplay();
      tonElem.innerText = "— TON";
      usdtElem.innerText = "0.00 USDT";
      showToast("API key cleared", "info");
    }
  }

  function showToast(msg, type) {
    let toast = document.getElementById("dynamic_toast");
    if (!toast) {
      toast = document.createElement("div");
      toast.id = "dynamic_toast";
      toast.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172ad9;backdrop-filter:blur(12px);padding:12px 24px;border-radius:60px;z-index:999;color:white";
      document.body.appendChild(toast);
    }
    toast.innerHTML = msg;
    toast.style.opacity = "1";
    setTimeout(() => { toast.style.opacity = "0"; setTimeout(() => toast.remove(), 500); }, 2500);
  }

  function openSettingsModal() {
    const modal = document.createElement("div");
    modal.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:2000";
    modal.innerHTML = `<div style="background:#111827;border-radius:40px;padding:28px;text-align:center;border:1px solid #3b82f6;"><h3>SAFEORA Settings</h3><p style="margin:16px 0">API: ${API_KEY ? "Connected" : "Not configured"}</p><button onclick="this.closest('div').parentElement.remove()" style="background:#3b82f6;border:none;padding:10px 20px;border-radius:60px;color:white;cursor:pointer">Close</button></div>`;
    document.body.appendChild(modal);
  }

  window.addEventListener("DOMContentLoaded", () => {
    updateApiDisplay();
    if (API_KEY) loadBalance();
  });

  window.createApiKey = createApiKey;
  window.manualRefreshBalance = manualRefreshBalance;
  window.clearApiWarning = clearApiWarning;
  window.openSettingsModal = openSettingsModal;
</script>
</body>
</html>
