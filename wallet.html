<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SAFEORA • Secure Crypto Wallet</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 10% 20%, #0a0c12, #03050b);
      font-family: 'Inter', sans-serif;
      padding: 24px 16px 40px;
      color: #ffffff;
      min-height: 100vh;
    }
    .app-container { max-width: 500px; margin: 0 auto; }
    
    /* header */
    .wallet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      background: rgba(15, 25, 45, 0.55);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 60px;
      border: 1px solid rgba(59, 130, 246, 0.25);
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      background: linear-gradient(135deg, #3b82f6, #2dd4bf);
      width: 38px; height: 38px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-text h1 {
      font-size: 1.65rem;
      font-weight: 700;
      background: linear-gradient(120deg, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-text p { font-size: 0.7rem; color: #7e8b9e; }
    .settings-btn {
      background: rgba(30, 41, 59, 0.8);
      border: none;
      width: 44px; height: 44px;
      border-radius: 40px;
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .settings-btn:hover { background: #3b82f6; transform: rotate(15deg); transition: 0.2s; }
  </style>
</head>
<body>
<div class="app-container">
<!-- HEADER -->
<div class="wallet-header">
  <div class="logo-area">
    <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
    <div class="logo-text">
      <h1>SAFEORA</h1>
      <p>Secure • Decentral • Vault</p>
    </div>
  </div>
  <button class="settings-btn" onclick="openSettings()"><i class="fas fa-sliders-h"></i></button>
</div>

<!-- TON CARD -->
<div class="glass-card">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <div style="display: flex; align-items: center; gap: 12px;">
      <i class="fab fa-telegram-plane" style="font-size: 28px; color: #3b82f6;"></i>
      <span style="font-size: 1.3rem; font-weight: 600;">TON Coin</span>
    </div>
    <span class="badge"><i class="fas fa-circle"></i> active</span>
  </div>
  <div class="balance" id="ton_balance">0.0000 TON</div>
</div>
<!-- USDT CARD -->
<div class="glass-card">
  <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
    <i class="fas fa-dollar-sign" style="font-size: 28px; color: #22c55e;"></i>
    <span style="font-size: 1.3rem; font-weight: 600;">USDT (TRC-20)</span>
  </div>
  <div class="balance" id="usdt_balance">0.00 USDT</div>
</div>

<style>
  .glass-card {
    background: rgba(18, 25, 45, 0.75);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 24px 22px;
    margin-bottom: 20px;
    border: 1px solid rgba(59, 130, 246, 0.3);
    transition: 0.2s;
  }
  .glass-card:hover { border-color: #3b82f680; transform: translateY(-2px); }
  .balance {
    font-size: 2.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #F0F4FF, #b9c7dc);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .badge {
    background: #10b98120;
    color: #6ee7b7;
    border-radius: 40px;
    padding: 4px 12px;
    font-size: 0.7rem;
  }
</style>
<!-- API SECTION with Copy Button & Documentation Link -->
<div class="glass-card" style="background: rgba(0,0,0,0.45);">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <h3 style="display: flex; align-items: center; gap: 8px;">
      <i class="fas fa-key"></i> API Access
    </h3>
    <div style="display: flex; gap: 12px;">
      <span id="api_status_badge" class="badge" style="background:#334155;"><i class="fas fa-lock"></i> not set</span>
      <a href="https://tbl-earn-production.up.railway.app/docs" target="_blank" style="color:#60a5fa; text-decoration:none; font-size:0.8rem;">
        <i class="fas fa-book"></i> Docs
      </a>
    </div>
  </div>
  
  <!-- Generate Button -->
  <button class="btn-primary" id="generateBtn" onclick="createApiKey()">
    <i class="fas fa-asterisk"></i> Generate API Key
  </button>
  
  <!-- API Key Display with Copy Button -->
  <div id="api_key_box" style="margin-top: 18px; display: none;">
    <div style="background: #0f172a; border-radius: 20px; padding: 14px 16px; border-left: 4px solid #3b82f6;">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <code id="api_key_value" style="font-size: 0.75rem; word-break: break-all; color: #bbd9ff;"></code>
        <button onclick="copyApiKey()" style="background: #3b82f6; border: none; padding: 6px 14px; border-radius: 40px; color: white; cursor: pointer; font-size: 0.7rem;">
          <i class="fas fa-copy"></i> Copy
        </button>
      </div>
      <div style="font-size: 0.65rem; color: #6c86a3; margin-top: 8px;">
        <i class="fas fa-shield-alt"></i> safeora-xxxxx format
      </div>
    </div>
  </div>
</div>
  <!-- ACTION BUTTONS -->
  <div style="display: flex; gap: 12px; margin-top: 10px;">
    <button class="btn-outline" onclick="manualRefresh()" style="flex:1;">
      <i class="fas fa-sync-alt"></i> Refresh
    </button>
    <button class="btn-outline" onclick="clearApi()" style="flex:1;">
      <i class="fas fa-trash-alt"></i> Clear API
    </button>
  </div>
  
  <div style="text-align: center; font-size: 0.7rem; color: #475569; margin-top: 40px;">
    <i class="fas fa-database"></i> SAFEORA non-custodial interface
  </div>
</div>

<style>
  .btn-primary {
    background: linear-gradient(95deg, #2563eb, #1e40af);
    border: none;
    width: 100%;
    padding: 14px;
    font-weight: 600;
    border-radius: 50px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .btn-primary:hover { background: linear-gradient(95deg, #3b82f6, #2563eb); transform: scale(0.98); }
  .btn-outline {
    background: rgba(255,255,255,0.05);
    border: 1px solid #2d3a5e;
    padding: 12px;
    border-radius: 40px;
    color: #e2e8f0;
    cursor: pointer;
  }
  .btn-outline:hover { background: rgba(59,130,246,0.2); border-color: #3b82f6; }
</style>

<script>
// ========== SAFEORA CORE ==========
let API_KEY = localStorage.getItem("safeora_api_key") || null;

const tonElem = document.getElementById("ton_balance");
const usdtElem = document.getElementById("usdt_balance");
const apiStatusSpan = document.getElementById("api_status_badge");
const apiKeyBox = document.getElementById("api_key_box");
const apiKeyValueSpan = document.getElementById("api_key_value");

function updateApiUI() {
  if (API_KEY) {
    apiStatusSpan.innerHTML = '<i class="fas fa-check-circle"></i> active';
    apiStatusSpan.style.background = "#0f3b2c60";
    apiStatusSpan.style.color = "#6ee7b7";
    if (apiKeyBox) {
      apiKeyBox.style.display = "block";
      // show key in safeora-xxxxx format
      let displayKey = API_KEY;
      if (displayKey && !displayKey.startsWith("safeora-")) {
        displayKey = "safeora-" + displayKey.substring(0, 16);
      }
      apiKeyValueSpan.innerText = displayKey;
    }
  } else {
    apiStatusSpan.innerHTML = '<i class="fas fa-lock"></i> not set';
    apiStatusSpan.style.background = "";
    apiStatusSpan.style.color = "#facc15";
    if (apiKeyBox) apiKeyBox.style.display = "none";
  }
}

function copyApiKey() {
  if (API_KEY) {
    navigator.clipboard.writeText(API_KEY);
    showToast("✅ API Key copied!", "success");
  } else {
    showToast("No API key to copy", "error");
  }
}

function showToast(msg, type) {
  let toast = document.getElementById("dynamic_toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.id = "dynamic_toast";
    toast.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172ad9;backdrop-filter:blur(12px);padding:12px 24px;border-radius:60px;z-index:999;color:white;font-size:0.85rem;";
    document.body.appendChild(toast);
  }
  toast.innerHTML = msg;
  toast.style.opacity = "1";
  setTimeout(() => { toast.style.opacity = "0"; setTimeout(() => toast.remove(), 500); }, 2500);
}
async function createApiKey() {
  let userId = prompt("🔐 Enter your User ID to generate API key\n(Example: username or email)");
  if (!userId || userId.trim() === "") return;
  
  const btn = document.getElementById("generateBtn");
  const originalText = btn.innerHTML;
  btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Generating...';
  
  try {
    const res = await fetch("/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId.trim() })
    });
    const data = await res.json();
    if (data.success && data.api_key) {
      // Format key as safeora-randomkey style
      let rawKey = data.api_key;
      if (!rawKey.startsWith("safeora-")) {
        rawKey = "safeora-" + rawKey;
      }
      API_KEY = rawKey;
      localStorage.setItem("safeora_api_key", API_KEY);
      updateApiUI();
      await loadBalance();
      showToast("✅ API Key generated! Format: safeora-xxxxx", "success");
    } else {
      throw new Error(data.message || "Registration failed");
    }
  } catch (err) {
    alert("Error: " + err.message);
    showToast("Failed to generate key", "error");
  } finally {
    btn.innerHTML = originalText;
  }
}

async function loadBalance() {
  if (!API_KEY) {
    tonElem.innerText = "0.0000 TON";
    usdtElem.innerText = "0.00 USDT";
    return;
  }
  try {
    const res = await fetch("/api/balance", {
      headers: { "x-api-key": API_KEY.replace("safeora-", "") }
    });
    if (!res.ok) throw new Error("API error");
    const data = await res.json();
    if (data.success) {
      let tonAmount = parseFloat(data.balance);
      tonElem.innerText = (isNaN(tonAmount) ? 0 : tonAmount).toFixed(4) + " TON";
      await loadUsdtBalance();
    }
  } catch (err) {
    tonElem.innerText = "0.0000 TON";
  }
}

async function loadUsdtBalance() {
  if (!API_KEY) { usdtElem.innerText = "0.00 USDT"; return; }
  try {
    const res = await fetch("/api/balance?asset=usdt", {
      headers: { "x-api-key": API_KEY.replace("safeora-", "") }
    });
    if (res.ok) {
      const data = await res.json();
      if (data.success) usdtElem.innerText = parseFloat(data.balance).toFixed(2) + " USDT";
    }
  } catch(e) { usdtElem.innerText = "0.00 USDT"; }
}
  async function manualRefresh() {
    if (!API_KEY) { alert("Generate API key first"); return; }
    await loadBalance();
    showToast("Balances refreshed", "info");
  }
  
  function clearApi() {
    if (confirm("⚠️ Remove API key? You'll need to generate a new one.")) {
      API_KEY = null;
      localStorage.removeItem("safeora_api_key");
      updateApiUI();
      tonElem.innerText = "0.0000 TON";
      usdtElem.innerText = "0.00 USDT";
      showToast("API key cleared", "info");
    }
  }
  
  function openSettings() {
    const modal = document.createElement("div");
    modal.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:2000;";
    modal.innerHTML = `<div style="background:#111827;border-radius:40px;padding:28px;text-align:center;border:1px solid #3b82f6;max-width:320px;">
      <i class="fas fa-cog" style="font-size:2rem;color:#3b82f6;"></i>
      <h3 style="margin:16px 0">SAFEORA Settings</h3>
      <p style="margin:8px 0">API: ${API_KEY ? "✅ Connected" : "❌ Not configured"}</p>
      <p style="font-size:0.75rem;color:#8b9bb5;"><i class="fas fa-link"></i> <a href="https://tbl-earn-production.up.railway.app/docs" target="_blank" style="color:#60a5fa;">Documentation</a></p>
      <button onclick="this.closest('div').parentElement.remove()" style="margin-top:20px;background:#3b82f6;border:none;padding:10px 20px;border-radius:60px;color:white;cursor:pointer;">Close</button>
    </div>`;
    document.body.appendChild(modal);
  }
  
  window.addEventListener("DOMContentLoaded", () => {
    updateApiUI();
    if (API_KEY) loadBalance();
  });
  
  window.createApiKey = createApiKey;
  window.manualRefresh = manualRefresh;
  window.clearApi = clearApi;
  window.openSettings = openSettings;
  window.copyApiKey = copyApiKey;
</script>
</body>
</html>
